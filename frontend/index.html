<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

            padding: 50px 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #2c3e50;
        }

        p {
            font-size: 1.1rem;
            color: #666;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: #3498db;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2980b9;
        }

        footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #999;
        }
